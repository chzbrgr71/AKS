<header>
  <h2><a href="{{ include.post.url | relative_url }}">{{ include.post.title }}</a></h2>
  {%- assign date_format = site.date_format | default: "%B %d, %Y" -%}
  <time datetime="{{ include.post.date | date_to_xmlschema }}">  Posted by {{ include.post.author }} on {{ include.post.date | date: date_format }}</time>
</header>
